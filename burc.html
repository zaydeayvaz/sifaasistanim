<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Şifi'nin Günlük Sağlık Burcu 🔮 — Şifa Asistanım</title>
  <meta name="description" content="Şifi'den günlük kişisel sağlık burcu! Bugün seni neler bekliyor? Sağlık ipucu, motivasyon ve mini challenge.">
  <meta property="og:title" content="Şifi'nin Günlük Sağlık Burcu 🔮">
  <meta property="og:description" content="Bugün seni neler bekliyor? Şifi'den günlük sağlık burcu al!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #7C3AED;
      --purple-dark: #5B21B6;
      --purple-light: #F5F3FF;
      --gold: #F59E0B;
      --gold-light: #FFFBEB;
      --blue: #2563EB;
      --text: #0F172A;
      --muted: #64748B;
    }
    body {
      font-family: 'Figtree', sans-serif;
      background: linear-gradient(180deg, #0F0A2E 0%, #1A1145 30%, #2D1B69 60%, #1A1145 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Yıldızlı arka plan */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px 20px;
      position: relative;
      z-index: 1;
    }
    .header a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
    }
    .header a:hover { color: white; }
    .header h1 {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 900;
      margin: 16px 0 8px;
      background: linear-gradient(135deg, #C084FC, #F9A8D4, #FDE68A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .date {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 600;
    }

    /* İsim giriş */
    .name-section {
      max-width: 400px;
      margin: 20px auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }
    .name-input-wrap {
      display: flex;
      gap: 10px;
    }
    .name-input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 100px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-family: 'Figtree', sans-serif;
      font-size: 16px;
      font-weight: 600;
      outline: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s;
    }
    .name-input:focus { border-color: var(--purple); }
    .name-input::placeholder { color: rgba(255,255,255,0.3); }
    .name-btn {
      padding: 14px 28px;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--purple), #A855F7);
      color: white;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .name-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(124,58,237,0.4); }

    /* Burc kartı */
    .burc-container {
      max-width: 440px;
      margin: 30px auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
      display: none;
    }
    .burc-container.visible { display: block; animation: cardIn 0.8s ease; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .burc-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 32px 24px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .burc-card::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(168,85,247,0.15), transparent 70%);
      border-radius: 50%;
    }

    .burc-greeting {
      font-family: 'Nunito', sans-serif;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 4px;
    }
    .burc-date-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
    }

    /* Sağlık skoru */
    .score-section {
      text-align: center;
      margin-bottom: 24px;
    }
    .score-ring {
      width: 120px;
      height: 120px;
      margin: 0 auto 12px;
      position: relative;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Nunito', sans-serif;
      font-size: 32px;
      font-weight: 900;
    }
    .score-label {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 600;
    }

    /* Bölümler */
    .section {
      margin-bottom: 20px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-emoji { font-size: 20px; }
    .section-title {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: rgba(255,255,255,0.9);
    }
    .section-body {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
    }
    .section-body strong {
      color: #C084FC;
      font-weight: 700;
    }

    /* Challenge */
    .challenge {
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
    }
    .challenge-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .challenge-text {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
    }

    /* Şifi mesajı */
    .sifi-message {
      background: linear-gradient(135deg, rgba(37,99,235,0.15), rgba(37,99,235,0.05));
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .sifi-message p {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      font-style: italic;
    }

    /* Paylaş */
    .share-section {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .share-text {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }
    .share-btns {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .share-btn {
      padding: 10px 20px;
      border-radius: 100px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      color: white;
    }
    .share-btn:hover { transform: translateY(-2px); }
    .share-wp { background: #25D366; }
    .share-tw { background: #1DA1F2; }
    .share-copy { background: rgba(255,255,255,0.15); }

    /* CTA */
    .cta-card {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-top: 20px;
    }
    .cta-card p {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
    }
    .cta-btn {
      display: inline-block;
      padding: 12px 28px;
      background: white;
      color: var(--purple);
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }
    .footer a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px; }
    .footer a:hover { color: white; }
  </style>
</head>

      <defs><clipPath id="bc"><rect x="78" y="85" width="144" height="220" rx="72"/></clipPath></defs>

    <div class="name-input-wrap">
      <input type="text" class="name-input" id="nameInput" placeholder="Adın..." maxlength="20" />

  <script>
  // Yıldızlar oluştur
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    starsEl.appendChild(star);
  }

  // Tarih
  const DAYS = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
  const MONTHS = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
  const now = new Date();
  const dayName = DAYS[now.getDay()];
  const dateStr = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()} ${dayName}`;
  document.getElementById('dateText').textContent = dateStr;

  // Günün seed'i (her gün farklı ama gün içi sabit)
  const daySeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
  function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }
  function pick(arr, seed) {
    return arr[Math.floor(seededRandom(seed) * arr.length)];
  }

  // Veri havuzları
  const ENERGY_TYPES = [
    { emoji: '🔥', name: 'Ateş Enerjisi', desc: 'Bugün enerjin çok yüksek! Hareket et, yürüyüş yap, vücudunu dinle.' },
    { emoji: '🌊', name: 'Su Enerjisi', desc: 'Bugün sakinlik günün. Bol su iç, derin nefes al, stres yönetimi yap.' },
    { emoji: '🌿', name: 'Toprak Enerjisi', desc: 'Bugün dengelenme günün. Doğada vakit geçir, sebze-meyve ağırlıklı beslen.' },
    { emoji: '💨', name: 'Hava Enerjisi', desc: 'Bugün zihinsel berraklık günün. Yeni şeyler öğren, yaratıcılığını kullan.' },
    { emoji: '⚡', name: 'Yıldırım Enerjisi', desc: 'Bugün çok güçlüsün! Ertelediğin sağlık kontrollerini halletmek için ideal gün.' },
    { emoji: '🌸', name: 'Çiçek Enerjisi', desc: 'Bugün şefkat günün. Kendine nazik ol, sevdiklerinle vakit geçir.' },
    { emoji: '🌙', name: 'Ay Enerjisi', desc: 'Bugün dinlenme günün. Erken yat, uyku kalitenize odaklan, ekrana az bak.' },
  ];

  const HEALTH_TIPS = [
    { title: '💧 Su Hatırlatması', text: 'Vücudun günde en az <strong>2 litre su</strong> istiyor. Her ilaçını alırken bir bardak su iç — hem ilacını yut, hem su ihtiyacını karşıla. Bir taşla iki kuş!' },
    { title: '🚶 Hareket Zamanı', text: 'Günde sadece <strong>20 dakika yürüyüş</strong> kalp hastalığı riskini %30 azaltıyor. İlacını aldıktan sonra kısa bir yürüyüş? Şifi seni destekliyor!' },
    { title: '😴 Uyku Kalitesi', text: 'Yeterli uyku, ilaç tedavisinin etkisini <strong>%40\'a kadar artırır</strong>. Bu gece telefonunu yatmadan 30 dakika önce bırakmayı dene.' },
    { title: '🥗 Beslenme İpucu', text: 'Bazı ilaçlar aç karnına, bazıları tok karnına alınmalı. <strong>Şifi sana hangisinin ne zaman</strong> alınacağını hatırlatıyor — merak etme!' },
    { title: '🧘 Stres Yönetimi', text: 'Kronik stres, ilaçların emilimini olumsuz etkiler. Günde <strong>5 dakika derin nefes</strong> egzersizi yap. 4 saniye nefes al, 7 saniye tut, 8 saniye ver.' },
    { title: '☀️ D Vitamini', text: 'Türkiye\'de her <strong>3 kişiden 2\'si D vitamini eksikliği</strong> yaşıyor. Günde 15-20 dakika güneş gör. Kış aylarında doktoruna danış.' },
    { title: '🫀 Kalp Sağlığı', text: 'Tansiyon ilacını <strong>her gün aynı saatte</strong> almak etkiyi %25 artırıyor. Şifi bu saati hiç unutturmaz!' },
    { title: '🧠 Zihinsel Sağlık', text: 'Ruh hali takibi yapanlar, depresyon belirtilerini <strong>2 hafta daha erken</strong> fark ediyor. Şifa Asistanım\'da ruh hali kaydet!' },
    { title: '🦷 Ağız Sağlığı', text: 'Bazı ilaçlar ağız kuruluğu yapar. Bol su iç ve <strong>şekersiz sakız</strong> çiğne. Diş sağlığı genel sağlığı etkiler!' },
    { title: '🏋️ Kas Gücü', text: 'Yaşla birlikte kas kaybı hızlanır. Haftada <strong>2-3 kez basit güç egzersizi</strong> yapmak kemik sağlığını da korur.' },
  ];

  const CHALLENGES = [
    { title: '🏆 Günün Challenge\'ı', text: 'Bugün tüm ilaçlarını zamanında al ve <strong>3 bardak ekstra su</strong> iç. Başarırsan Şifi sana XP verecek!' },
    { title: '🎯 Mini Görev', text: 'Bir yakınını ara ve sağlığını sor. Sonra ona <strong>Şifa Asistanım\'ı öner</strong>. Sevgi bulaşıcıdır!' },
    { title: '⭐ Altın Görev', text: 'Bugün <strong>30 dakika ekransız</strong> vakit geçir. Kitap oku, yürüyüş yap veya sadece gökyüzüne bak.' },
    { title: '💪 Sağlık Challenge', text: 'Bugün <strong>merdiven kullan, asansör bırak</strong>. Her merdiven 1 XP! Şifi sayıyor (gizlice).' },
    { title: '🌈 Mutluluk Görevi', text: 'Bugün 3 şey yaz: <strong>Sağlığınla ilgili minnettar olduğun 3 şey</strong>. Küçük şeyler büyük fark yaratır.' },
    { title: '🧩 Beyin Egzersizi', text: 'Bugün bir <strong>bulmaca çöz veya yeni bir kelime öğren</strong>. Zihinsel aktivite beyin sağlığını korur.' },
    { title: '🤝 Paylaşım Görevi', text: 'Bu burcu bir arkadaşına gönder ve birlikte <strong>sağlıklı bir hedef belirleyin</strong>. Birlikte daha güçlüsünüz!' },
  ];

  const SIFI_MSGS = [
    'Bugün senin günün! Her dozunu zamanında al, seri bozmayalım. 🔥 Birlikte güçlüyüz!',
    'Hey! Seni düşünüyorum. İlaçlarını almayı unutma, ben burada bekliyorum. 💙',
    'Biliyorsun, her ilaç dozun bir adım daha sağlığına yaklaştırıyor. Gurur duyuyorum! ⭐',
    'Bugün kendine bir iyilik yap — ilaçlarını al, su iç, gülümse. Hepsi bu kadar. 😊',
    'Şifi\'den özel not: Sen sandığından daha güçlüsün. Her gün bunu kanıtlıyorsun. 💪',
    'Bir sır vereyim mi? Senin ilaçlarını düzenli alman beni de mutlu ediyor. Birlikte büyüyoruz! 🚀',
    'Unutma: Sağlık bir maraton, sprint değil. Bugün de bir adım attın. Tebrikler! 🏅',
  ];

  const LUCKY = ['💊', '💙', '⭐', '🌿', '🔥', '💪', '🧘', '☀️', '🌈', '🫀', '🦋', '🍀'];
  const COLORS = ['Mor', 'Mavi', 'Yeşil', 'Turuncu', 'Pembe', 'Turkuaz', 'Altın', 'Gök Mavisi'];

  function revealBurc() {
    const name = document.getElementById('nameInput').value.trim() || 'Dostum';
    document.getElementById('nameSection').style.display = 'none';

    // Günlük seed + isim seed
    const nameSeed = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const seed = daySeed + nameSeed;

    // Skor (60-98 arası)
    const score = 60 + Math.floor(seededRandom(seed) * 38);
    const energy = pick(ENERGY_TYPES, seed + 1);
    const tip = pick(HEALTH_TIPS, seed + 2);
    const challenge = pick(CHALLENGES, seed + 3);
    const sifiMsg = pick(SIFI_MSGS, seed + 4);
    const luckyEmoji = pick(LUCKY, seed + 5);
    const luckyColor = pick(COLORS, seed + 6);
    const luckyNumber = 1 + Math.floor(seededRandom(seed + 7) * 9);

    // Greeting
    const hour = now.getHours();
    const timeGreet = hour < 12 ? 'Günaydın' : hour < 18 ? 'İyi günler' : 'İyi akşamlar';
    document.getElementById('greeting').textContent = `${timeGreet}, ${name}! ✨`;
    document.getElementById('burcDate').textContent = dateStr;

    // Skor animasyonu
    const scoreCircle = document.getElementById('scoreCircle');
    const scoreNum = document.getElementById('scoreNumber');
    const offset = 327 - (327 * score / 100);
    setTimeout(() => {
      scoreCircle.style.transition = 'stroke-dashoffset 1.5s ease';
      scoreCircle.style.strokeDashoffset = offset;
    }, 300);
    let counter = 0;
    const counterInterval = setInterval(() => {
      counter += 2;
      if (counter >= score) { counter = score; clearInterval(counterInterval); }
      scoreNum.textContent = counter;
    }, 30);

    // Bölümler
    document.getElementById('sections').innerHTML = `
      <div class="section">
        <div class="section-header">
          <span class="section-emoji">${energy.emoji}</span>
          <span class="section-title">${energy.name}</span>
        </div>
        <div class="section-body">${energy.desc}</div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-emoji">💡</span>
          <span class="section-title">${tip.title}</span>
        </div>
        <div class="section-body">${tip.text}</div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-emoji">🍀</span>
          <span class="section-title">Şanslı Detayların</span>
        </div>
        <div class="section-body">
          Şanslı emoji: <strong>${luckyEmoji}</strong> · Şanslı renk: <strong>${luckyColor}</strong> · Şanslı sayı: <strong>${luckyNumber}</strong>
        </div>
      </div>
    `;

    // Challenge
    document.getElementById('challenge').innerHTML = `
      <div class="challenge-title">${challenge.title}</div>
      <div class="challenge-text">${challenge.text}</div>
    `;

    // Şifi mesajı
    document.getElementById('sifiMsg').innerHTML = `
      <svg width="36" height="45" viewBox="0 0 300 380" fill="none" style="flex-shrink:0;">
        <defs><clipPath id="sm"><rect x="78" y="85" width="144" height="220" rx="72"/></clipPath></defs>
        <g clip-path="url(#sm)"><rect x="78" y="85" width="144" height="120" fill="#7C3AED"/><rect x="78" y="205" width="144" height="100" fill="#F5F3FF"/></g>
        <circle cx="124" cy="170" r="18" fill="white"/><circle cx="128" cy="168" r="9" fill="#0F172A"/><circle cx="132" cy="164" r="4" fill="white"/>
        <circle cx="176" cy="170" r="18" fill="white"/><circle cx="180" cy="168" r="9" fill="#0F172A"/><circle cx="184" cy="164" r="4" fill="white"/>
        <path d="M135 222 Q150 238 165 222" stroke="#0F172A" stroke-width="3" stroke-linecap="round" fill="none"/>
      </svg>
      <p>"${sifiMsg}"<br><strong>— Şifi 🤖</strong></p>
    `;

    // Göster
    document.getElementById('burcCard').classList.add('visible');

    // Paylaşım URL güncelle
    window._burcName = name;
    window._burcScore = score;
  }

  // Enter ile gönder
  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') revealBurc();
  });

  // Paylaşım
  function shareWP() {
    const text = `🔮 Şifi'nin Günlük Sağlık Burcu\n\n${window._burcName || 'Ben'}: Bugün sağlık enerjim ${window._burcScore || '??'}/100!\n\nSen de öğren 👉 ${location.href}`;
    window.open('https://wa.me/?text=' + encodeURIComponent(text));
  }
  function shareTW() {
    const text = `🔮 Bugün sağlık enerjim ${window._burcScore || '??'}/100! Şifi'nin Günlük Sağlık Burcu'na baktım.\n\nSen de dene 👉`;
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text) + '&url=' + encodeURIComponent(location.href));
  }
  function copyLink() {
    navigator.clipboard.writeText(location.href).then(() => {
      const btn = document.querySelector('.share-copy');
      btn.textContent = '✅ Kopyalandı!';
      setTimeout(() => btn.textContent = '🔗 Kopyala', 2000);
    });
  }
  </script>
</body>
</html>
