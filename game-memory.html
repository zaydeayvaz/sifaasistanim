<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hafiza Oyunu - Sifa Asistan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;overflow-x:hidden;color:#333}
.screen{display:none;min-height:100vh;padding:16px;padding-bottom:100px}
.screen.active{display:flex;flex-direction:column;align-items:center}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:500px;margin-bottom:12px}
.back-btn,.share-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.back-btn:active,.share-btn:active{transform:scale(0.9)}
.header-title{color:#fff;font-size:18px;font-weight:700;text-align:center;flex:1}

/* MENU */
.menu-container{width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:20px;margin-top:20px}
.sifi-logo{width:100px;height:100px;background:linear-gradient(135deg,#43e97b,#38f9d7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:52px;box-shadow:0 8px 32px rgba(67,233,123,0.4);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.menu-title{color:#fff;font-size:28px;font-weight:800;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.menu-subtitle{color:rgba(255,255,255,0.85);font-size:15px;text-align:center}
.total-stars-display{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);border-radius:16px;padding:12px 24px;color:#fff;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.total-stars-display span{color:#ffd700;font-size:20px}

/* LEVEL SELECT */
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:500px;margin-top:8px}
.level-btn{background:rgba(255,255,255,0.95);border:none;border-radius:16px;padding:16px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.level-btn:active{transform:scale(0.95)}
.level-btn.locked{opacity:0.5;cursor:not-allowed;background:rgba(255,255,255,0.4)}
.level-btn .lvl-num{font-size:22px;font-weight:800;color:#764ba2}
.level-btn.locked .lvl-num{color:#999}
.level-btn .lvl-diff{font-size:11px;color:#888;font-weight:600}
.level-btn .lvl-stars{font-size:14px;letter-spacing:2px}
.level-btn .lock-icon{font-size:20px;color:#999}
.diff-label{width:100%;max-width:500px;text-align:left;color:rgba(255,255,255,0.9);font-size:13px;font-weight:700;margin-top:16px;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}

/* GAME SCREEN */
.game-hud{width:100%;max-width:500px;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.timer-bar-container{width:100%;height:8px;background:rgba(255,255,255,0.2);border-radius:4px;overflow:hidden}
.timer-bar{height:100%;background:#43e97b;border-radius:4px;transition:width 0.3s linear,background-color 0.5s}
.hud-row{display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:14px;font-weight:600}
.hud-item{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;backdrop-filter:blur(10px)}
.streak-badge{background:linear-gradient(135deg,#f093fb,#f5576c)!important;animation:pulse 0.5s ease-in-out}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* CARD GRID */
.card-grid{display:grid;gap:8px;width:100%;max-width:500px;perspective:1000px}
.card-cell{aspect-ratio:1;perspective:600px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);border-radius:14px}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.card-back{background:linear-gradient(135deg,#667eea,#764ba2);border:2px solid rgba(255,255,255,0.3);box-shadow:0 4px 15px rgba(0,0,0,0.15)}
.card-back-pattern{font-size:24px;opacity:0.6}
.card-front{background:#fff;transform:rotateY(180deg);border:2px solid #e0e0e0;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
.card-front .card-emoji{font-size:clamp(24px,6vw,40px)}
.card-front .card-name{font-size:clamp(8px,2vw,11px);color:#555;font-weight:600;text-align:center;line-height:1.1}
.card.matched .card-front{border-color:#43e97b;box-shadow:0 0 20px rgba(67,233,123,0.5);background:linear-gradient(135deg,#f0fff4,#fff)}
.card.mismatched .card-front{border-color:#f5576c;box-shadow:0 0 20px rgba(245,87,108,0.5)}
.card.matched .sparkle{position:absolute;pointer-events:none}

/* SIFI BUBBLE */
.sifi-bubble{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);z-index:100;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;transform:translateX(-50%) translateY(20px);max-width:90vw}
.sifi-bubble.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.sifi-bubble .sifi-mini{width:36px;height:36px;background:linear-gradient(135deg,#43e97b,#38f9d7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sifi-bubble .sifi-text{font-size:14px;font-weight:600;color:#333}

/* LEVEL COMPLETE MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:24px;padding:32px 24px;max-width:380px;width:100%;text-align:center;animation:modalIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes modalIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:24px;color:#764ba2;margin-bottom:4px}
.modal .modal-stars{font-size:40px;margin:12px 0;letter-spacing:8px}
.modal .modal-score{font-size:16px;color:#555;margin-bottom:16px}
.modal .modal-bonus{font-size:13px;color:#888;margin-bottom:16px}
.modal-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.modal-btn{padding:12px 24px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.2s}
.modal-btn:active{transform:scale(0.95)}
.modal-btn.primary{background:linear-gradient(135deg,#43e97b,#38f9d7);color:#fff;box-shadow:0 4px 15px rgba(67,233,123,0.4)}
.modal-btn.secondary{background:#f0f0f0;color:#555}

/* SPARKLE PARTICLES */
.sparkle-particle{position:fixed;pointer-events:none;z-index:150;font-size:16px;animation:sparkleAnim 0.8s ease-out forwards}
@keyframes sparkleAnim{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* CONFETTI */
.confetti{position:fixed;top:-10px;z-index:250;pointer-events:none;animation:confettiFall var(--dur) linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* SHARE */
.share-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.3s;z-index:300;pointer-events:none}
.share-toast.show{opacity:1}
</style>
</head>
<body>

<!-- MENU SCREEN -->
<div class="screen active" id="menuScreen">
  <div class="header">
    <a href="index.html" class="back-btn">←</a>
    <div class="header-title">Hafiza Oyunu</div>
    <div style="width:42px"></div>
  </div>
  <div class="menu-container">
    <div class="sifi-logo">🧠</div>
    <div class="menu-title">Ilac Eslestirme</div>
    <div class="menu-subtitle">Kartlari cevir, esleri bul!</div>
    <div class="total-stars-display"><span>⭐</span> <span id="totalStars">0</span> / 45</div>
    <div id="levelsContainer"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="header">
    <button class="back-btn" id="gameBackBtn">←</button>
    <div class="header-title" id="gameTitle">Seviye 1</div>
    <button class="share-btn" id="shareBtn">📤</button>
  </div>
  <div class="game-hud">
    <div class="timer-bar-container"><div class="timer-bar" id="timerBar"></div></div>
    <div class="hud-row">
      <div class="hud-item">⏱ <span id="timerText">30s</span></div>
      <div class="hud-item" id="streakBadge">🔥 <span id="streakText">x1</span></div>
      <div class="hud-item">💎 <span id="scoreText">0</span></div>
    </div>
  </div>
  <div class="card-grid" id="cardGrid"></div>
</div>

<!-- LEVEL COMPLETE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Tebrikler!</h2>
    <div class="modal-stars" id="modalStars">⭐⭐⭐</div>
    <div class="modal-score" id="modalScore">Puan: 1000</div>
    <div class="modal-bonus" id="modalBonus"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="modalMenuBtn">Seviyeler</button>
      <button class="modal-btn secondary" id="modalRetryBtn">Tekrar</button>
      <button class="modal-btn primary" id="modalNextBtn">Sonraki →</button>
    </div>
  </div>
</div>

<!-- TIME UP MODAL -->
<div class="modal-overlay" id="timeUpOverlay">
  <div class="modal">
    <h2>Sure Doldu! ⏰</h2>
    <div style="font-size:48px;margin:16px 0">😔</div>
    <div class="modal-score">Yaklastin, bir daha dene!</div>
    <div class="modal-btns">
      <button class="modal-btn secondary" id="timeUpMenuBtn">Seviyeler</button>
      <button class="modal-btn primary" id="timeUpRetryBtn">Tekrar Dene</button>
    </div>
  </div>
</div>

<!-- SIFI BUBBLE -->
<div class="sifi-bubble" id="sifiBubble">
  <div class="sifi-mini">🤖</div>
  <div class="sifi-text" id="sifiText"></div>
</div>

<!-- SHARE TOAST -->
<div class="share-toast" id="shareToast">Link kopyalandi!</div>

<script>
// ===== DATA =====
const MEDICATIONS = [
  { emoji: '💊', name: 'Tablet' },
  { emoji: '🧴', name: 'Surup' },
  { emoji: '💉', name: 'Igne' },
  { emoji: '🩹', name: 'Yara Bandi' },
  { emoji: '🩺', name: 'Steteskop' },
  { emoji: '💎', name: 'Vitamin' },
  { emoji: '🌡️', name: 'Termometre' },
  { emoji: '🏥', name: 'Hastane' },
  { emoji: '🧪', name: 'Lab' },
  { emoji: '💧', name: 'Damla' },
  { emoji: '🫀', name: 'Kalp' },
  { emoji: '🧠', name: 'Beyin' }
];

const LEVELS = [
  { cols:3, rows:2, pairs:3, time:30, diff:'Kolay' },
  { cols:3, rows:2, pairs:3, time:30, diff:'Kolay' },
  { cols:3, rows:2, pairs:3, time:30, diff:'Kolay' },
  { cols:4, rows:3, pairs:6, time:45, diff:'Orta' },
  { cols:4, rows:3, pairs:6, time:45, diff:'Orta' },
  { cols:4, rows:3, pairs:6, time:45, diff:'Orta' },
  { cols:4, rows:4, pairs:8, time:60, diff:'Zor' },
  { cols:4, rows:4, pairs:8, time:60, diff:'Zor' },
  { cols:4, rows:4, pairs:8, time:60, diff:'Zor' },
  { cols:5, rows:4, pairs:10, time:75, diff:'Cok Zor' },
  { cols:5, rows:4, pairs:10, time:75, diff:'Cok Zor' },
  { cols:5, rows:4, pairs:10, time:75, diff:'Cok Zor' },
  { cols:6, rows:4, pairs:12, time:90, diff:'Uzman' },
  { cols:6, rows:4, pairs:12, time:90, diff:'Uzman' },
  { cols:6, rows:4, pairs:12, time:90, diff:'Uzman' }
];

const SIFI_MATCH = ["Harika!", "Super!", "Muhtesem!", "Aferin!", "Devam et!", "Bravo!"];
const SIFI_MISS = ["Hmm, tekrar dene!", "Yakindin!", "Bir daha bak!", "Olsun, devam!"];
const SIFI_COMPLETE = ["Tebrikler! Harika oyun!", "Muhteeem! Basardin!", "Super hafiza!"];
const SIFI_HURRY = ["Acele et!", "Sure azaliyor!", "Hizlan!"];

// ===== STATE =====
let gameState = {
  currentLevel: 0,
  cards: [],
  flippedCards: [],
  matchedPairs: 0,
  totalPairs: 0,
  score: 0,
  streak: 0,
  misses: 0,
  timeLeft: 0,
  totalTime: 0,
  timerInterval: null,
  lastMatchTime: 0,
  isLocked: false,
  hurryShown: false
};

let progress = JSON.parse(localStorage.getItem('sifa_memory_progress') || '{}');
if (!progress.levels) progress.levels = {};
if (!progress.unlocked) progress.unlocked = 1;

function saveProgress() {
  localStorage.setItem('sifa_memory_progress', JSON.stringify(progress));
}

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== LEVEL SELECT =====
function renderLevels() {
  const container = document.getElementById('levelsContainer');
  container.innerHTML = '';
  let currentDiff = '';
  const groups = {};

  LEVELS.forEach((lvl, i) => {
    if (!groups[lvl.diff]) groups[lvl.diff] = [];
    groups[lvl.diff].push(i);
  });

  Object.entries(groups).forEach(([diff, indices]) => {
    const label = document.createElement('div');
    label.className = 'diff-label';
    label.textContent = diff;
    container.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'levels-grid';

    indices.forEach(i => {
      const btn = document.createElement('button');
      const unlocked = i + 1 <= progress.unlocked;
      btn.className = 'level-btn' + (unlocked ? '' : ' locked');
      const stars = progress.levels[i + 1]?.stars || 0;
      const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

      if (unlocked) {
        btn.innerHTML = `<div class="lvl-num">${i + 1}</div><div class="lvl-diff">${LEVELS[i].cols}x${LEVELS[i].rows}</div><div class="lvl-stars">${starStr}</div>`;
        btn.onclick = () => startGame(i);
      } else {
        btn.innerHTML = `<div class="lock-icon">🔒</div><div class="lvl-num" style="font-size:16px;color:#999">${i + 1}</div>`;
      }
      grid.appendChild(btn);
    });

    container.appendChild(grid);
  });

  // Update total stars
  let total = 0;
  Object.values(progress.levels).forEach(l => total += (l.stars || 0));
  document.getElementById('totalStars').textContent = total;
}

// ===== GAME =====
function startGame(levelIndex) {
  const lvl = LEVELS[levelIndex];
  gameState = {
    currentLevel: levelIndex,
    cards: [],
    flippedCards: [],
    matchedPairs: 0,
    totalPairs: lvl.pairs,
    score: 0,
    streak: 0,
    misses: 0,
    timeLeft: lvl.time,
    totalTime: lvl.time,
    timerInterval: null,
    lastMatchTime: Date.now(),
    isLocked: false,
    hurryShown: false
  };

  document.getElementById('gameTitle').textContent = `Seviye ${levelIndex + 1} - ${lvl.diff}`;
  document.getElementById('scoreText').textContent = '0';
  document.getElementById('streakText').textContent = 'x1';
  document.getElementById('streakBadge').classList.remove('streak-badge');
  document.getElementById('timerText').textContent = lvl.time + 's';
  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerBar').style.backgroundColor = '#43e97b';

  // Generate cards
  let meds = [...MEDICATIONS];
  shuffle(meds);
  let selected = meds.slice(0, lvl.pairs);

  // For expert levels (13-15), add "tricky" similar icons
  if (levelIndex >= 12) {
    // Already using all 12, they are similar enough
  }

  let cardData = [];
  selected.forEach((med, idx) => {
    cardData.push({ id: idx, emoji: med.emoji, name: med.name, pairId: idx });
    cardData.push({ id: idx, emoji: med.emoji, name: med.name, pairId: idx });
  });
  shuffle(cardData);

  gameState.cards = cardData;

  // Render grid
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${lvl.cols}, 1fr)`;

  cardData.forEach((card, i) => {
    const cell = document.createElement('div');
    cell.className = 'card-cell';
    cell.innerHTML = `
      <div class="card" data-index="${i}" data-pair="${card.pairId}">
        <div class="card-face card-back"><div class="card-back-pattern">🤖</div></div>
        <div class="card-face card-front"><div class="card-emoji">${card.emoji}</div><div class="card-name">${card.name}</div></div>
      </div>`;
    cell.onclick = () => flipCard(i);
    grid.appendChild(cell);
  });

  showScreen('gameScreen');

  // Brief preview: show all cards for a moment then hide
  const allCards = grid.querySelectorAll('.card');
  allCards.forEach(c => c.classList.add('flipped'));
  setTimeout(() => {
    allCards.forEach(c => c.classList.remove('flipped'));
    startTimer();
  }, 1200);
}

function flipCard(index) {
  if (gameState.isLocked) return;
  const grid = document.getElementById('cardGrid');
  const card = grid.querySelectorAll('.card')[index];

  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (gameState.flippedCards.length >= 2) return;
  if (gameState.flippedCards.some(c => c.index === index)) return;

  card.classList.add('flipped');
  gameState.flippedCards.push({ index, pairId: parseInt(card.dataset.pair), element: card });

  if (gameState.flippedCards.length === 2) {
    gameState.isLocked = true;
    checkMatch();
  }
}

function checkMatch() {
  const [c1, c2] = gameState.flippedCards;
  const isMatch = c1.pairId === c2.pairId;

  if (isMatch) {
    gameState.matchedPairs++;
    gameState.streak++;

    // Score
    let pts = 100;
    const elapsed = Date.now() - gameState.lastMatchTime;
    if (elapsed < 3000) pts += 50;

    const multiplier = Math.min(1 + (gameState.streak - 1) * 0.5, 3);
    pts = Math.round(pts * multiplier);
    gameState.score += pts;
    gameState.lastMatchTime = Date.now();

    document.getElementById('scoreText').textContent = gameState.score;
    updateStreak();

    c1.element.classList.add('matched');
    c2.element.classList.add('matched');

    // Sparkle
    spawnSparkles(c1.element);
    spawnSparkles(c2.element);

    showSifi(SIFI_MATCH[Math.floor(Math.random() * SIFI_MATCH.length)]);

    setTimeout(() => {
      gameState.flippedCards = [];
      gameState.isLocked = false;

      if (gameState.matchedPairs === gameState.totalPairs) {
        levelComplete();
      }
    }, 400);
  } else {
    gameState.misses++;
    gameState.streak = 0;
    updateStreak();

    c1.element.classList.add('mismatched');
    c2.element.classList.add('mismatched');

    showSifi(SIFI_MISS[Math.floor(Math.random() * SIFI_MISS.length)]);

    setTimeout(() => {
      c1.element.classList.remove('flipped', 'mismatched');
      c2.element.classList.remove('flipped', 'mismatched');
      gameState.flippedCards = [];
      gameState.isLocked = false;
    }, 1000);
  }
}

function updateStreak() {
  const badge = document.getElementById('streakBadge');
  const text = document.getElementById('streakText');
  const mult = Math.min(1 + (gameState.streak - 1) * 0.5, 3);
  if (gameState.streak < 1) {
    text.textContent = 'x1';
    badge.classList.remove('streak-badge');
  } else {
    text.textContent = 'x' + mult.toFixed(1).replace('.0', '');
    if (gameState.streak >= 2) {
      badge.classList.remove('streak-badge');
      void badge.offsetWidth;
      badge.classList.add('streak-badge');
    }
  }
}

// ===== TIMER =====
function startTimer() {
  clearInterval(gameState.timerInterval);
  const bar = document.getElementById('timerBar');
  const text = document.getElementById('timerText');

  gameState.timerInterval = setInterval(() => {
    gameState.timeLeft -= 0.1;
    if (gameState.timeLeft <= 0) {
      gameState.timeLeft = 0;
      clearInterval(gameState.timerInterval);
      timeUp();
    }

    const pct = (gameState.timeLeft / gameState.totalTime) * 100;
    bar.style.width = pct + '%';
    text.textContent = Math.ceil(gameState.timeLeft) + 's';

    if (pct > 50) bar.style.backgroundColor = '#43e97b';
    else if (pct > 25) bar.style.backgroundColor = '#ffd700';
    else bar.style.backgroundColor = '#f5576c';

    if (pct <= 25 && !gameState.hurryShown) {
      gameState.hurryShown = true;
      showSifi(SIFI_HURRY[Math.floor(Math.random() * SIFI_HURRY.length)]);
    }
  }, 100);
}

function timeUp() {
  gameState.isLocked = true;
  document.getElementById('timeUpOverlay').classList.add('show');
}

// ===== LEVEL COMPLETE =====
function levelComplete() {
  clearInterval(gameState.timerInterval);
  gameState.isLocked = true;

  const lvl = LEVELS[gameState.currentLevel];
  const timeUsed = lvl.time - gameState.timeLeft;
  const isPerfect = gameState.misses === 0;

  if (isPerfect) gameState.score += 500;

  // Stars
  let stars = 1;
  if (timeUsed <= lvl.time / 2) stars = 2;
  if (isPerfect || timeUsed <= lvl.time / 3) stars = 3;

  // Save
  const lvlNum = gameState.currentLevel + 1;
  if (!progress.levels[lvlNum] || progress.levels[lvlNum].stars < stars) {
    progress.levels[lvlNum] = { stars, score: gameState.score };
  }
  if (lvlNum >= progress.unlocked && lvlNum < 15) {
    progress.unlocked = lvlNum + 1;
  }
  saveProgress();

  // Show modal
  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('modalStars').textContent = starStr;
  document.getElementById('modalScore').textContent = 'Puan: ' + gameState.score;

  let bonusText = '';
  if (isPerfect) bonusText += 'Mukemmel oyun bonusu: +500 | ';
  bonusText += `Sure: ${timeUsed.toFixed(1)}s / ${lvl.time}s`;
  if (gameState.misses === 0) bonusText += ' | Hata: 0';
  else bonusText += ` | Hata: ${gameState.misses}`;
  document.getElementById('modalBonus').textContent = bonusText;

  if (gameState.currentLevel >= 14) {
    document.getElementById('modalNextBtn').style.display = 'none';
    document.getElementById('modalTitle').textContent = 'Tum seviyeleri bitirdin!';
  } else {
    document.getElementById('modalNextBtn').style.display = '';
    document.getElementById('modalTitle').textContent = 'Tebrikler!';
  }

  showSifi(SIFI_COMPLETE[Math.floor(Math.random() * SIFI_COMPLETE.length)]);

  setTimeout(() => {
    document.getElementById('modalOverlay').classList.add('show');
    spawnConfetti();
  }, 500);
}

// ===== SIFI BUBBLE =====
let sifiBubbleTimer = null;
function showSifi(text) {
  const bubble = document.getElementById('sifiBubble');
  document.getElementById('sifiText').textContent = text;
  bubble.classList.add('show');
  clearTimeout(sifiBubbleTimer);
  sifiBubbleTimer = setTimeout(() => bubble.classList.remove('show'), 2000);
}

// ===== EFFECTS =====
function spawnSparkles(element) {
  const rect = element.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['✨', '⭐', '💫', '🌟'];

  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'sparkle-particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle = (Math.PI * 2 * i) / 6;
    const dist = 40 + Math.random() * 30;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 800);
  }
}

function spawnConfetti() {
  const colors = ['#f5576c', '#43e97b', '#667eea', '#ffd700', '#f093fb', '#38f9d7'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.width = (6 + Math.random() * 8) + 'px';
    c.style.height = (6 + Math.random() * 8) + 'px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.setProperty('--dur', (1.5 + Math.random() * 2) + 's');
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== SHARE =====
function shareGame() {
  const lvl = gameState.currentLevel + 1;
  const text = `Sifa Asistani Hafiza Oyunu - Seviye ${lvl}'de ${gameState.score} puan aldim! 🧠💊`;
  if (navigator.share) {
    navigator.share({ title: 'Sifa Asistani', text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById('shareToast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}

// ===== EVENT LISTENERS =====
document.getElementById('gameBackBtn').onclick = () => {
  clearInterval(gameState.timerInterval);
  renderLevels();
  showScreen('menuScreen');
};

document.getElementById('shareBtn').onclick = shareGame;

document.getElementById('modalMenuBtn').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('show');
  renderLevels();
  showScreen('menuScreen');
};

document.getElementById('modalRetryBtn').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('show');
  startGame(gameState.currentLevel);
};

document.getElementById('modalNextBtn').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('show');
  if (gameState.currentLevel < 14) startGame(gameState.currentLevel + 1);
};

document.getElementById('timeUpMenuBtn').onclick = () => {
  document.getElementById('timeUpOverlay').classList.remove('show');
  renderLevels();
  showScreen('menuScreen');
};

document.getElementById('timeUpRetryBtn').onclick = () => {
  document.getElementById('timeUpOverlay').classList.remove('show');
  startGame(gameState.currentLevel);
};

// ===== INIT =====
renderLevels();
</script>
