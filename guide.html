  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --blue-light: #EFF6FF;
      --green: #10B981;
      --orange: #F59E0B;
      --red: #EF4444;
      --purple: #8B5CF6;
      --text: #0F172A;
      --muted: #64748B;
      --bg: #F8FAFF;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --font-display: 'Nunito', sans-serif;
      --font: 'Figtree', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(248,250,255,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(226,232,240,0.7);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-size: 18px; font-weight: 900; color: var(--text); text-decoration: none; }
    .nav-logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #2563EB, #60A5FA); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* HERO */
    .hero {
      text-align: center; padding: 80px 24px 40px;
      background: linear-gradient(135deg, #0F172A 0%, #1E3A8A 50%, #2563EB 100%);
      color: white; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero h1 { font-family: var(--font-display); font-size: clamp(28px, 5vw, 42px); font-weight: 900; margin-bottom: 12px; position: relative; }
    .hero p { font-size: 17px; color: rgba(255,255,255,0.75); max-width: 500px; margin: 0 auto 30px; position: relative; }

    /* SIFI CHAT */
    .chat-container {
      max-width: 700px; margin: -40px auto 0; padding: 0 16px 40px; position: relative; z-index: 10;
    }
    .chat-box {
      background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(15,23,42,0.12);
      border: 1px solid var(--border); overflow: hidden;
    }
    .chat-header {
      background: linear-gradient(135deg, #2563EB, #3B82F6);
      padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    }
    .chat-header-name { color: white; font-family: var(--font-display); font-weight: 800; font-size: 16px; }
    .chat-header-status { color: rgba(255,255,255,0.7); font-size: 12px; }
    .chat-messages {
      padding: 20px; min-height: 400px; max-height: 500px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 85%; padding: 12px 16px; border-radius: 18px;
      font-size: 15px; line-height: 1.6; animation: msgIn 0.3s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-sifi {
      background: var(--blue-light); color: var(--text); align-self: flex-start;
      border-bottom-left-radius: 6px;
    }
    .msg-user {
      background: var(--blue); color: white; align-self: flex-end;
      border-bottom-right-radius: 6px;
    }
    .msg-sifi strong { color: var(--blue); }

    /* OPTIONS */
    .options {
      display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0;
      animation: msgIn 0.3s ease;
    }
    .option-btn {
      padding: 10px 18px; border-radius: 100px;
      background: white; color: var(--blue);
      border: 2px solid var(--blue);
      font-family: var(--font); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .option-btn:hover {
      background: var(--blue); color: white;
      transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .option-btn:active { transform: translateY(0); }

    /* TYPING */
    .typing { display: flex; gap: 4px; padding: 12px 16px; align-self: flex-start; }
    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #94A3B8;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* FEATURE CARDS IN CHAT */
    .feature-card-inline {
      background: linear-gradient(135deg, #F8FAFF, #EFF6FF);
      border: 1px solid #DBEAFE; border-radius: 16px;
      padding: 16px; margin-top: 8px;
    }
    .feature-card-inline h4 {
      font-family: var(--font-display); font-size: 15px; font-weight: 800;
      color: var(--text); margin-bottom: 6px;
    }
    .feature-card-inline p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .feature-card-inline .emoji { font-size: 28px; margin-bottom: 8px; display: block; }

    /* CTA */
    .cta-inline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 12px;
      background: linear-gradient(135deg, #2563EB, #3B82F6);
      color: white; font-weight: 700; font-size: 14px;
      text-decoration: none; margin-top: 10px;
      transition: all 0.2s;
    }
    .cta-inline:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(37,99,235,0.4); }

    /* PROGRESS */
    .progress-bar {
      height: 4px; background: #E2E8F0; border-radius: 4px; margin: 12px 0 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 4px; transition: width 0.5s ease;
    }
    .progress-text { font-size: 11px; color: var(--muted); text-align: right; }

    /* QUIZ RESULT */
    .quiz-result {
      background: linear-gradient(135deg, #DCFCE7, #F0FDF4);
      border: 1px solid #BBF7D0; border-radius: 16px;
      padding: 20px; text-align: center; margin-top: 8px;
    }
    .quiz-result .score { font-family: var(--font-display); font-size: 48px; font-weight: 900; color: #16A34A; }
    .quiz-result .label { font-size: 14px; color: #166534; font-weight: 700; margin-top: 4px; }

    /* FOOTER */
    footer {
      text-align: center; padding: 40px 24px;
      color: var(--muted); font-size: 13px;
    }
    footer a { color: var(--blue); text-decoration: none; }

    @media (max-width: 600px) {
      .chat-messages { min-height: 350px; }
      .msg { max-width: 92%; }
    }
  </style>
</head>

        quizWrong: true,
        options: [
          { text: '➡️ Sonraki soru', next: 'q2' },
        ]
      },
      q2: {
        sifi: '📝 Soru 2/3:\n\nTürkiye\'de 65 yaş üstü bireylerin ortalama kaç farklı ilaç kullandığı tahmin ediliyor?',
        quiz: true,
        options: [
          { text: '2-3 ilaç', next: 'q2_wrong' },
          { text: '5-7 ilaç', next: 'q2_right' },
          { text: '10+ ilaç', next: 'q2_wrong' },
        ]
      },
      q2_right: {
        sifi: '✅ Doğru! 65 yaş üstü bireylerin büyük çoğunluğu 5-7 farklı ilaç kullanıyor. Buna "polifarmasi" deniyor.\n\nBu kadar ilacı takip etmek gerçekten zor — ama Şifi ile çok kolay! 😊',
        quizCorrect: true,
        options: [
          { text: '➡️ Son soru!', next: 'q3' },
        ]
      },
      q2_wrong: {
        sifi: '❌ Doğru cevap: <strong>5-7 ilaç</strong>!\n\n65 yaş üstünde "polifarmasi" çok yaygın. Bu kadar ilacı takip etmek büyük bir zorluk.\n\nAile takip özelliği tam da bunun için var — yakınlarının ilaçlarını uzaktan takip edebilirsin! 👨‍👩‍👧',
        quizWrong: true,
        options: [
          { text: '➡️ Son soru!', next: 'q3' },
        ]
      },
      q3: {
        sifi: '📝 Soru 3/3:\n\nİlaç takip uygulaması kullanan hastalarda tedaviye uyum oranı ne kadar artıyor?',
        quiz: true,
        options: [
          { text: '%10-15 artış', next: 'q3_wrong' },
          { text: '%25-30 artış', next: 'q3_right' },
          { text: '%5 artış', next: 'q3_wrong' },
        ]
      },
      q3_right: {
        sifi: '✅ Mükemmel! Araştırmalar, dijital hatırlatıcı kullanan hastalarda ilaç uyumunun %25-30 arttığını gösteriyor.\n\nTeknoloji hayat kurtarıyor! 🚀',
        quizCorrect: true,
        options: [
          { text: '📊 Sonuçlarımı gör!', next: 'quiz_result' },
        ]
      },
      q3_wrong: {
        sifi: '❌ Doğru cevap: <strong>%25-30 artış</strong>!\n\nDijital hatırlatıcılar ilaç uyumunu ciddi şekilde artırıyor. Bu demek ki daha az hastaneye yatış, daha iyi yaşam kalitesi!\n\nŞifa Asistanım tam da bunu yapıyor. 💙',
        quizWrong: true,
        options: [
          { text: '📊 Sonuçlarımı gör!', next: 'quiz_result' },
        ]
      },
      quiz_result: {
        sifi: 'quiz_result_dynamic',
        options: [
          { text: '📱 Uygulamayı indir!', next: 'download' },
          { text: '🔄 Diğer özellikleri keşfet', next: 'main_menu' },
        ]
      },
      download: {
        sifi: '🎉 Harika karar! Şifi seni bekliyor!\n\nLansman döneminde <strong>tüm premium özellikler ücretsiz</strong>!\n\n<a href="#" class="cta-inline">🍎 App Store</a>\n<a href="#" class="cta-inline" style="background:linear-gradient(135deg,#34A853,#0F9D58); margin-left: 8px;">▶️ Google Play</a>\n\nHer iki platformda da mevcut! 📱',
        options: [
          { text: '🔄 Başka özellik keşfet', next: 'main_menu' },
          { text: '💬 Teşekkürler Şifi!', next: 'bye' },
        ]
      },
      bye: {
        sifi: 'Rica ederim! 💙 Seni uygulamada bekliyorum!\n\nUnutma: Her ilaç dozunda XP kazanırsın, birlikte seviye atlayacağız! 🚀\n\n— Şifi 🤖',
        options: []
      }
    };

    let quizScore = 0;

    function addMessage(type, html) {
      const div = document.createElement('div');
      div.className = 'msg msg-' + type;
      div.innerHTML = html.replace(/\n/g, '<br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addCard(emoji, title, desc) {
      const div = document.createElement('div');
      div.className = 'msg msg-sifi';
      div.innerHTML = `<div class="feature-card-inline"><span class="emoji">${emoji}</span><h4>${title}</h4><p>${desc}</p></div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addOptions(options) {
      const wrap = document.createElement('div');
      wrap.className = 'options';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.onclick = () => {
          // Remove options
          wrap.remove();
          // Show user message
          addMessage('user', opt.text);
          // Process next
          setTimeout(() => goTo(opt.next, opt.text), 400);
        };
        wrap.appendChild(btn);
      });
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function addProgress() {
      const pct = Math.round((questionCount / totalQuestions) * 100);
      const div = document.createElement('div');
      div.style.cssText = 'align-self: flex-start; width: 60%;';
      div.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-text">Keşif: ${pct}%</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addQuizResult() {
      const div = document.createElement('div');
      div.className = 'msg msg-sifi';
      const pct = Math.round((quizScore / 3) * 100);
      const label = pct === 100 ? 'Mükemmel! 🏆' : pct >= 66 ? 'Harika! ⭐' : pct >= 33 ? 'İyi! 👍' : 'Öğrenmeye devam! 📚';
      div.innerHTML = `<div class="quiz-result"><div class="score">${quizScore}/3</div><div class="label">${label}</div><p style="margin-top:12px;font-size:13px;color:#166534;">İlaç takibi konusunda bilgin ${pct === 100 ? 'tam puan' : 'artıyor'}! Şifa Asistanım ile daha fazlasını keşfet.</p></div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function goTo(nodeId) {
      const node = tree[nodeId];
      if (!node) return;

      // Track quiz
      if (node.quizCorrect) quizScore++;

      addTyping();

      const delay = node.sifi.length > 200 ? 1200 : 800;

      setTimeout(() => {
        removeTyping();

        if (nodeId === 'quiz_result') {
          addQuizResult();
        } else {
          addMessage('sifi', node.sifi);
        }

        if (node.card) {
          setTimeout(() => addCard(node.card.emoji, node.card.title, node.card.desc), 300);
        }

        // Track exploration progress
        if (['med_tracking','family','gamification','health','calendar','privacy'].includes(nodeId)) {
          questionCount++;
          setTimeout(() => addProgress(), 400);
        }

        if (node.options && node.options.length > 0) {
          setTimeout(() => addOptions(node.options), node.card ? 600 : 400);
        }
      }, delay);
    }

    // Start conversation
    setTimeout(() => goTo('start'), 500);
  })();
  </script>
