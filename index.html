<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Şifa Asistanım</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        input, button { outline: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.body.innerHTML = '<div style="padding:20px; color:red; font-family:sans-serif;"><h3>Bir Hata Oluştu :(</h3><p>' + msg + '</p><p>Satır: ' + line + '</p></div>';
            return false;
        };
    </script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 h-screen overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- İKON BİLEŞENİ (DÜZELTİLDİ) ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        // --- İKON TANIMLARI (FRAGMAN HATASI GİDERİLDİ) ---
        const Icons = {
            Home: (p) => <Icon {...p} path={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />,
            History: (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/><path d="M12 7v5l4 2"/></>} />,
            PlusCircle: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></>} />,
            Settings: (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2-.3l-.15-.09a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 .3l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 .3l.15.09a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2-.3l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></>} />,
            Camera: (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />,
            Pill: (p) => <Icon {...p} path={<><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></>} />,
            Check: (p) => <Icon {...p} path={<polyline points="20 6 9 17 4 12"/>} />,
            X: (p) => <Icon {...p} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />,
            Trash2: (p) => <Icon {...p} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>} />,
            Clock: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />,
            Calendar: (p) => <Icon {...p} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>} />,
            Activity: (p) => <Icon {...p} path={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} />,
            FileText: (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />,
            User: (p) => <Icon {...p} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />,
            Send: (p) => <Icon {...p} path={<><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>} />,
            ExternalLink: (p) => <Icon {...p} path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></>} />,
            CheckCircle2: (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />,
            Loader2: (p) => <Icon {...p} className={`${p.className} animate-spin`} path={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />,
            CalendarDays: (p) => <Icon {...p} path={<><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>} />
        };

        const { Home, History: HistoryIcon, Camera, Settings: SettingsIcon, Check, X, User, Trash2, Send, ExternalLink, Loader2, Pill, Clock, Calendar, Activity, FileText, CheckCircle2, CalendarDays, PlusCircle } = Icons;

        // --- SABİT AYARLAR ---
        const API_BASE = "";
        const BOT_USERNAME = "sifa_app_bot";
        const ALERT_SOUND_URL = "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3";
        const PRE_ALERT_MINUTES = 15;

        // --- RENKLER ---
        const MED_COLORS = [
            'from-blue-500 to-cyan-400',
            'from-purple-500 to-pink-400',
            'from-orange-500 to-amber-400',
            'from-emerald-500 to-teal-400',
            'from-rose-500 to-red-400',
        ];

        const WEEKDAYS = [
            { id: 1, label: 'Pzt' }, { id: 2, label: 'Sal' }, { id: 3, label: 'Çar' },
            { id: 4, label: 'Per' }, { id: 5, label: 'Cum' }, { id: 6, label: 'Cmt' },
            { id: 0, label: 'Paz' }
        ];

        // --- YARDIMCI FONKSİYONLAR ---
        const subtractMinutes = (timeStr, minutes) => {
            const [h, m] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(h, m - minutes);
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        };

        const sendTelegramMessage = async (chatId, message) => {
            if (!chatId) return;
            try {
                const response = await fetch(`${API_BASE}/api/telegram/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, message })
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || 'Telegram mesajı gönderilemedi');
                }
            } catch (error) { console.error(error); }
        };

        const checkConnectionWithCode = async (verificationCode) => {
            try {
                const response = await fetch(`${API_BASE}/api/telegram/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ verificationCode })
                });
                const data = await response.json();
                return data.match || null;
            } catch (error) { return null; }
        };

        // --- BİLEŞENLER ---
        const DashboardSummary = ({ total, taken, userName }) => {
            const percentage = total === 0 ? 0 : Math.round((taken / total) * 100);
            return (
                <div className="bg-gradient-to-br from-indigo-600 via-violet-600 to-purple-700 rounded-[32px] p-6 text-white shadow-2xl shadow-indigo-200 mb-8 relative overflow-hidden group">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -mr-20 -mt-20 blur-3xl"></div>
                    <div className="absolute bottom-0 left-0 w-48 h-48 bg-indigo-400 opacity-10 rounded-full -ml-10 -mb-10 blur-2xl"></div>
                    <div className="relative z-10">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <p className="text-indigo-200 text-[11px] font-bold uppercase tracking-widest mb-1">Günlük Durum</p>
                                <h2 className="text-2xl font-bold tracking-tight">Merhaba, {userName || 'Misafir'} 👋</h2>
                            </div>
                            <div className="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-md border border-white/10">
                                <Activity size={24} className="text-white" />
                            </div>
                        </div>
                        <div className="flex items-end gap-3 mb-4">
                            <span className="text-5xl font-black tracking-tighter">{taken}</span>
                            <span className="text-lg font-medium text-indigo-100 mb-1.5 opacity-80">/ {total} Doz</span>
                        </div>
                        <div className="w-full bg-black/20 h-3 rounded-full overflow-hidden backdrop-blur-sm">
                            <div className="bg-gradient-to-r from-emerald-400 to-teal-300 h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${percentage}%` }}></div>
                        </div>
                    </div>
                </div>
            );
        };

        const MedicationForm = ({ onSave, onCancel, initialImage, onClearImage }) => {
            const [name, setName] = useState('');
            const [dosage, setDosage] = useState('');
            const [notes, setNotes] = useState('');
            const [frequency, setFrequency] = useState('daily');
            const [selectedDays, setSelectedDays] = useState([]);
            const [times, setTimes] = useState([]);
            const [tempTime, setTempTime] = useState('09:00');

            const addTime = () => { if (!times.includes(tempTime)) setTimes([...times, tempTime].sort()); };
            const removeTime = (t) => setTimes(times.filter(x => x !== t));
            const toggleDay = (day) => { selectedDays.includes(day) ? setSelectedDays(selectedDays.filter(d => d !== day)) : setSelectedDays([...selectedDays, day]); };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (times.length === 0) { alert("Lütfen en az bir saat ekleyin!"); return; }
                if (frequency !== 'daily' && selectedDays.length === 0) { alert("Lütfen en az bir gün seçin!"); return; }

                const randomColor = MED_COLORS[Math.floor(Math.random() * MED_COLORS.length)];
                const newMed = {
                    id: Math.random().toString(36).substr(2, 9),
                    name, dosage, frequency, selectedDays, times, image: initialImage, notes, color: randomColor
                };
                onSave(newMed);
                if(initialImage) onClearImage();
            };

            return (
                <div className="space-y-6 animate-in pb-24 fade-in">
                    <div className="flex justify-between items-center px-2">
                        <h2 className="text-2xl font-bold text-slate-800">İlaç Ekle</h2>
                        <button onClick={onCancel} className="p-2 bg-slate-100 rounded-full"><X size={20} className="text-slate-600"/></button>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-6">
                         <div className="flex justify-center">
                            {initialImage ? (
                                <div className="relative w-full h-40 rounded-[24px] overflow-hidden shadow-lg border-4 border-white">
                                    <img src={initialImage} className="w-full h-full object-cover" />
                                    <button type="button" onClick={onClearImage} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-xl"><Trash2 size={16}/></button>
                                </div>
                            ) : (
                                <div className="w-full h-32 border-2 border-dashed border-slate-200 rounded-[24px] flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                                    <Camera size={24} className="mb-2 text-indigo-400"/>
                                    <span className="text-xs font-bold">Fotoğraf (Opsiyonel)</span>
                                </div>
                            )}
                        </div>
                        <div className="space-y-4">
                            <div className="relative"><div className="absolute left-4 top-4 text-slate-400"><Pill size={20} /></div><input required type="text" value={name} onChange={e => setName(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700" placeholder="İlaç Adı" /></div>
                            <div className="relative"><div className="absolute left-4 top-4 text-slate-400"><Activity size={20} /></div><input required type="text" value={dosage} onChange={e => setDosage(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700" placeholder="Dozaj" /></div>
                        </div>
                         <div className="flex p-1 bg-slate-100 rounded-2xl">
                            {['daily', 'weekly', 'monthly'].map(f => (
                                <button key={f} type="button" onClick={() => setFrequency(f)} className={`flex-1 py-3 rounded-xl text-sm font-bold ${frequency === f ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>
                                    {f === 'daily' ? 'Her Gün' : f === 'weekly' ? 'Haftalık' : 'Aylık'}
                                </button>
                            ))}
                        </div>
                        {frequency === 'weekly' && (
                            <div className="flex justify-between gap-1">
                                {WEEKDAYS.map(day => (
                                    <button key={day.id} type="button" onClick={() => toggleDay(day.id)} className={`w-10 h-10 rounded-full text-xs font-bold flex items-center justify-center ${selectedDays.includes(day.id) ? 'bg-indigo-600 text-white' : 'bg-white border text-slate-400'}`}>{day.label[0]}</button>
                                ))}
                            </div>
                        )}
                         {frequency === 'monthly' && (
                            <div className="grid grid-cols-7 gap-2">
                                {Array.from({length: 31}, (_, i) => i + 1).map(day => (
                                    <button key={day} type="button" onClick={() => toggleDay(day)} className={`h-8 rounded-lg text-xs font-bold flex items-center justify-center ${selectedDays.includes(day) ? 'bg-indigo-600 text-white' : 'bg-white border text-slate-400'}`}>{day}</button>
                                ))}
                            </div>
                        )}
                        <div className="space-y-3">
                             <div className="flex gap-2">
                                <div className="relative flex-1"><div className="absolute left-4 top-3.5 text-slate-400"><Clock size={20} /></div><input type="time" value={tempTime} onChange={e => setTempTime(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700" /></div>
                                <button type="button" onClick={addTime} className="bg-slate-900 text-white px-5 rounded-2xl font-bold text-sm flex items-center gap-2"><PlusCircle size={18} /> Ekle</button>
                            </div>
                            <div className="flex flex-wrap gap-2">{times.map(t => <div key={t} className="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-xl text-sm font-bold border border-indigo-100 flex items-center gap-2">{t}<button type="button" onClick={() => removeTime(t)}><X size={14}/></button></div>)}</div>
                        </div>
                         <div className="relative"><div className="absolute left-4 top-4 text-slate-400"><FileText size={20} /></div><input type="text" value={notes} onChange={e => setNotes(e.target.value)} className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium text-slate-700" placeholder="Notlar" /></div>
                        <button type="submit" className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2"><Check size={20} /> Kaydet</button>
                    </form>
                </div>
            );
        };

        const MedicationList = ({ medications, onDelete, onMarkTaken, history, userName }) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const todayDate = new Date();
            
            const todaysMeds = medications.filter(med => {
                if (med.frequency === 'daily') return true;
                if (med.frequency === 'weekly') return med.selectedDays.includes(todayDate.getDay());
                if (med.frequency === 'monthly') return med.selectedDays.includes(todayDate.getDate());
                return false;
            });

            const totalDoses = todaysMeds.reduce((acc, med) => acc + med.times.length, 0);
            const takenDoses = todaysMeds.reduce((acc, med) => acc + med.times.filter(t => history.some(h => h.medicationId === med.id && h.scheduledTime === t && h.takenAt.startsWith(todayStr))).length, 0);

            const getIsTaken = (medId, time) => history.some(h => h.medicationId === medId && h.scheduledTime === time && h.takenAt.startsWith(todayStr));

            return (
                <div className="space-y-8 pb-24">
                    <DashboardSummary total={totalDoses} taken={takenDoses} userName={userName} />
                    <div>
                        <div className="mb-6 px-2"><h3 className="text-xl font-bold text-slate-900">Bugünün Planı</h3><p className="text-xs font-medium text-slate-400 mt-1">{todayDate.toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' })}</p></div>
                        {todaysMeds.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-16 px-6 bg-white rounded-[32px] border border-dashed border-slate-200 text-center"><div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-6"><CalendarDays size={32} className="text-indigo-300"/></div><h3 className="text-lg font-bold text-slate-700">Bugün İlaç Yok</h3></div>
                        ) : (
                            <div className="grid gap-5">
                                {todaysMeds.map((med, index) => {
                                    const gradient = med.color || MED_COLORS[index % MED_COLORS.length];
                                    const allTaken = med.times.every(t => getIsTaken(med.id, t));
                                    return (
                                        <div key={med.id} className={`relative bg-white rounded-[32px] p-5 border shadow-lg ${allTaken ? 'border-emerald-100 bg-emerald-50/30' : 'border-slate-100'}`}>
                                            <div className="absolute top-5 right-5 z-10"><button onClick={() => onDelete(med.id)} className="p-2 text-slate-300 hover:text-red-500"><Trash2 size={16}/></button></div>
                                            <div className="flex items-start gap-5">
                                                <div className={`relative shrink-0 w-20 h-20 rounded-2xl overflow-hidden shadow-md flex items-center justify-center bg-gradient-to-br ${gradient}`}>
                                                    {med.image ? <img src={med.image} className="w-full h-full object-cover opacity-90 mix-blend-overlay" /> : <Pill size={32} className="text-white" />}
                                                    {allTaken && <div className="absolute inset-0 bg-emerald-500/20 flex items-center justify-center"><CheckCircle2 size={32} className="text-white"/></div>}
                                                </div>
                                                <div className="flex-1 min-w-0 py-1">
                                                    <h3 className={`text-xl font-bold mb-1 ${allTaken ? 'text-emerald-800 line-through' : 'text-slate-800'}`}>{med.name}</h3>
                                                    <div className="flex flex-wrap gap-2 mb-3"><span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-lg">{med.dosage}</span></div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {med.times.map(time => {
                                                            const taken = getIsTaken(med.id, time);
                                                            return (
                                                                <button key={time} disabled={taken} onClick={() => onMarkTaken(med.id, time)} className={`flex items-center gap-2 px-3 py-1.5 rounded-xl text-sm font-bold border ${taken ? 'bg-emerald-100 border-emerald-200 text-emerald-700' : 'bg-white border-slate-200 text-slate-600'}`}>
                                                                    <span className="font-mono">{time}</span>{taken && <Check size={14}/>}
                                                                </button>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const SettingsScreen = ({ settings, setSettings }) => {
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState('');
            const [verificationCode] = useState(() => Math.floor(1000 + Math.random() * 9000).toString());

            const handleConnect = async () => {
                setLoading(true); setStatusMsg("Aranıyor...");
                const result = await checkConnectionWithCode(verificationCode);
                if (result) {
                    setSettings({ ...settings, telegramChatId: result.id, telegramUserFirstName: result.name });
                    setStatusMsg("✅ Eşleşti!");
                    await sendTelegramMessage(result.id, "✅ <b>EŞLEŞME TAMAMLANDI!</b>\nŞifa Uygulaması başarıyla bağlandı.");
                } else { setStatusMsg(`❌ Bulunamadı. Kodu gönderdiniz mi?`); }
                setLoading(false);
            };

            return (
                <div className="space-y-6 pb-20 animate-in fade-in">
                    <h2 className="text-2xl font-bold text-slate-800 px-2">Ayarlar</h2>
                    <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-4">
                        <div className="flex items-center gap-4 mb-2"><div className="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center"><User size={24} /></div><div><h3 className="font-bold text-slate-800 text-lg">Profil</h3><p className="text-xs text-slate-400">Hasta Bilgileri</p></div></div>
                        <input type="text" value={settings.userName} onChange={e => setSettings({ ...settings, userName: e.target.value })} placeholder="Adınız" className="w-full px-5 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-slate-700" />
                    </div>
                    <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
                        <div className="flex items-center gap-4"><div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center"><Send size={24} /></div><div><h3 className="font-bold text-slate-800 text-lg">Telegram</h3><p className="text-xs text-slate-400">Bildirim Ayarları</p></div></div>
                        {!settings.telegramChatId ? (
                            <div className="space-y-6">
                                <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-200 text-center space-y-4">
                                    <p className="text-sm font-bold text-slate-500">Bu Kodu Bota Gönderin</p>
                                    <div className="text-5xl font-black text-slate-800 tracking-widest font-mono">{verificationCode}</div>
                                </div>
                                <div className="flex gap-3">
                                    <a href={`https://t.me/${BOT_USERNAME}`} target="_blank" className="bg-slate-100 text-slate-600 w-16 h-16 rounded-2xl flex items-center justify-center"><ExternalLink size={24}/></a>
                                    <button onClick={handleConnect} disabled={loading} className="flex-1 bg-blue-600 text-white h-16 rounded-2xl font-bold text-lg flex items-center justify-center gap-3">{loading ? <Loader2 className="animate-spin" size={24} /> : <span>Eşleş</span>}</button>
                                </div>
                                {statusMsg && <p className="text-sm text-center font-bold text-slate-500">{statusMsg}</p>}
                            </div>
                        ) : (
                            <div className="bg-green-50 border border-green-100 p-5 rounded-2xl space-y-4">
                                <div className="flex items-center gap-3"><CheckCircle2 size={20} className="text-green-600"/><span className="text-sm font-bold text-green-800">Bağlantı Aktif</span></div>
                                <div className="bg-white/80 p-4 rounded-xl border border-green-100"><span className="text-xs font-bold text-slate-400">Alıcı</span><div className="text-sm font-black text-slate-800">{settings.telegramUserFirstName}</div></div>
                                <button onClick={() => setSettings({...settings, telegramChatId: ''})} className="w-full py-3 bg-white text-rose-500 border border-rose-100 rounded-xl font-bold text-xs">Bağlantıyı Kes</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [medications, setMedications] = useState([]);
            const [history, setHistory] = useState([]);
            const [scanningImage, setScanningImage] = useState(null);
            const [settings, setSettings] = useState({ userName: '', telegramChatId: '', telegramUserFirstName: '' });
            const [notifiedMeds, setNotifiedMeds] = useState([]);
            const lastCheckedMinute = useRef('');

            useEffect(() => {
                const savedMeds = localStorage.getItem('sifa_meds');
                const savedHistory = localStorage.getItem('sifa_history');
                const savedSettings = localStorage.getItem('sifa_settings');
                if (savedMeds) setMedications(JSON.parse(savedMeds));
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                if (savedSettings) setSettings(JSON.parse(savedSettings));
                if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();
            }, []);

            useEffect(() => { localStorage.setItem('sifa_meds', JSON.stringify(medications)); }, [medications]);
            useEffect(() => { localStorage.setItem('sifa_history', JSON.stringify(history)); }, [history]);
            useEffect(() => { localStorage.setItem('sifa_settings', JSON.stringify(settings)); }, [settings]);

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    const currentMinute = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    const todayStr = now.toISOString().split('T')[0];
                    const dayOfWeek = now.getDay();
                    const dayOfMonth = now.getDate();

                    if (currentMinute !== lastCheckedMinute.current) {
                        lastCheckedMinute.current = currentMinute;
                        medications.forEach(med => {
                            let isTodayActive = false;
                            if (med.frequency === 'daily') isTodayActive = true;
                            if (med.frequency === 'weekly' && med.selectedDays.includes(dayOfWeek)) isTodayActive = true;
                            if (med.frequency === 'monthly' && med.selectedDays.includes(dayOfMonth)) isTodayActive = true;

                            if (isTodayActive) {
                                med.times.forEach(medTime => {
                                    const preAlertTime = subtractMinutes(medTime, PRE_ALERT_MINUTES);
                                    const preNotifKey = `pre-${med.id}-${todayStr}-${medTime}`;
                                    if (currentMinute === preAlertTime && !notifiedMeds.includes(preNotifKey)) {
                                        triggerAlarm(med, medTime, true);
                                        setNotifiedMeds(p => [...p, preNotifKey]);
                                    }
                                    const mainNotifKey = `main-${med.id}-${todayStr}-${medTime}`;
                                    if (currentMinute === medTime && !notifiedMeds.includes(mainNotifKey)) {
                                        triggerAlarm(med, medTime, false);
                                        setNotifiedMeds(p => [...p, mainNotifKey]);
                                    }
                                });
                            }
                        });
                    }
                }, 5000);
                return () => clearInterval(interval);
            }, [medications, notifiedMeds, settings]);

            const triggerAlarm = (med, time, isPre) => {
                if(!isPre) { const audio = new Audio(ALERT_SOUND_URL); audio.play().catch(()=>{}); }
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification(isPre ? "⏳ Yaklaşıyor" : "🚨 İlaç Vakti", { body: `${med.name} ${isPre ? 'ilacına 15dk kaldı.' : 'zamanı geldi.'}` });
                }
                if (settings.telegramChatId) {
                    const msg = isPre 
                        ? `⏳ <b>HATIRLATMA (15 dk kaldı)</b>\n\n👤 <b>${settings.userName}</b>\n💊 <b>İlaç:</b> ${med.name}\n⏰ <b>Saat:</b> ${time}`
                        : `🚨 <b>İLAÇ VAKTİ GELDİ</b>\n\n👤 <b>${settings.userName}</b>\n💊 <b>İlaç:</b> ${med.name}\n⏰ <b>Saat:</b> ${time}`;
                    sendTelegramMessage(settings.telegramChatId, msg);
                }
            };

            const handleMarkAsTaken = (medId, time) => {
                setHistory(p => [...p, { id: Math.random().toString(), medicationId: medId, takenAt: new Date().toISOString(), scheduledTime: time }]);
                const med = medications.find(m => m.id === medId);
                if (med && settings.telegramChatId) {
                    sendTelegramMessage(settings.telegramChatId, `✅ <b>İLAÇ ALINDI</b>\n\n👤 <b>${settings.userName}</b>\n💊 <b>İlaç:</b> ${med.name}\n⏰ <b>Planlanan:</b> ${time}`);
                }
            };

            const renderContent = () => {
                if (view === 'home') return <MedicationList medications={medications} onDelete={id=>setMedications(m=>m.filter(x=>x.id!==id))} onMarkTaken={handleMarkAsTaken} history={history} userName={settings.userName} />;
                if (view === 'add') return <MedicationForm onSave={m=>{setMedications(p=>[...p,m]);setView('home')}} onCancel={()=>setView('home')} initialImage={scanningImage} onClearImage={()=>setScanningImage(null)} />;
                if (view === 'history') return <div className="pb-24"><h2 className="text-2xl font-bold mb-4 px-2">Geçmiş</h2>{[...history].reverse().map(h => { const m = medications.find(x=>x.id===h.medicationId); return m ? <div key={h.id} className="bg-white p-4 rounded-2xl mb-2 flex justify-between shadow-sm border border-slate-100"><div><div className="font-bold">{m.name}</div><div className="text-xs text-slate-400">{new Date(h.takenAt).toLocaleString('tr-TR')}</div></div></div> : null })}</div>;
                if (view === 'camera') return <div className="h-[70vh] flex flex-col items-center justify-center space-y-8"><div className="w-40 h-40 bg-indigo-50 rounded-full flex items-center justify-center animate-pulse"><Camera size={64} className="text-indigo-600"/></div><label className="bg-slate-900 text-white px-10 py-5 rounded-[24px] font-bold shadow-xl">Kamerayı Aç<input type="file" accept="image/*" className="hidden" onChange={e=>{if(e.target.files[0]){const r=new FileReader();r.onload=ev=>{setScanningImage(ev.target.result);setView('add')};r.readAsDataURL(e.target.files[0])}}} /></label><button onClick={()=>setView('home')} className="font-bold text-slate-400">Vazgeç</button></div>;
                if (view === 'settings') return <SettingsScreen settings={settings} setSettings={setSettings} />;
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col relative overflow-x-hidden font-sans">
                    <header className="px-6 pt-8 pb-4 sticky top-0 z-40 bg-[#F8FAFC]/90 backdrop-blur-md">
                        <div className="flex justify-between items-center">
                            <h1 className="text-2xl font-black text-slate-900 flex items-center gap-2"><div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Pill size={20} className="-rotate-45"/></div>Şifa Asistanım</h1>
                            <button onClick={()=>setView('camera')} className="w-12 h-12 bg-white rounded-2xl shadow-sm flex items-center justify-center border hover:bg-slate-50"><Camera size={22} /></button>
                        </div>
                    </header>
                    <main className="flex-1 px-6 py-4">{renderContent()}</main>
                    <nav className="fixed bottom-8 left-6 right-6 max-w-[400px] mx-auto bg-white/90 backdrop-blur-xl border border-white/40 shadow-2xl rounded-[32px] p-2 flex justify-between items-center z-50">
                        <button onClick={()=>setView('home')} className={`p-4 rounded-2xl transition-all ${view==='home'?'bg-slate-900 text-white':'text-slate-400'}`}><Home size={24}/></button>
                        <button onClick={()=>setView('history')} className={`p-4 rounded-2xl transition-all ${view==='history'?'bg-slate-900 text-white':'text-slate-400'}`}><HistoryIcon size={24}/></button>
                        <button onClick={()=>setView('add')} className="bg-indigo-600 text-white p-5 rounded-[24px] shadow-xl -mt-8 border-4 border-[#F8FAFC]"><PlusCircle size={28}/></button>
                        <div className="w-16"></div>
                        <button onClick={()=>setView('settings')} className={`p-4 rounded-2xl transition-all ${view==='settings'?'bg-slate-900 text-white':'text-slate-400'}`}><SettingsIcon size={24}/></button>
                    </nav>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
